name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Viet lenh de chay pytest tren thu muc tests/ voi co -v
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2: Ghi noi dung credentials ra file tam va set bien moi truong xac thuc.
        # Them tracking MLflow tu xa voi DagsHub neu co secrets (Bonus 1)
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
          if [ ! -z "${{ secrets.MLFLOW_TRACKING_USERNAME }}" ]; then
            echo "MLFLOW_TRACKING_URI=https://dagshub.com/${{ github.repository }}.mlflow" >> $GITHUB_ENV
            echo "MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}" >> $GITHUB_ENV
            echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Pull data with DVC
        # TODO 3: Pull cac file du lieu can thiet tu cloud storage bang lenh dvc pull.
        run: |
          dvc remote modify myremote credentialpath /tmp/sa-key.json
          dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json bang Python inline.
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        # TODO 5: Su dung cloud SDK de upload models/model.pkl len GCS
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          bucket_name = "${{ secrets.CLOUD_BUCKET }}"
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print("Model uploaded to GCS successfully.")
          EOF

      - name: Save metrics as artifact
        # Bonus 3: Ghi vao report.txt va upload metric cung report.txt
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            outputs/metrics.json
            outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70) va so sanh hieu suat cu (Bonus 4).
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Authenticate to Cloud Storage
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Install google-cloud-storage
        run: pip install google-cloud-storage

      - name: Check eval gate
        # TODO 6: Doc accuracy tu output cua job train.
        # So sanh accuracy moi va cu (Bonus 4), chi cho phep deploy khi acc moi >= acc cu
        run: |
          python - <<'EOF'
          import os
          import json
          from google.cloud import storage
          
          new_acc = float("${{ needs.train.outputs.accuracy }}")
          if new_acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {new_acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: Threshold check (accuracy {new_acc:.4f} >= 0.70)")
          
          # Bonus 4: Hoàn Trả Về Phiên Bản Trước
          client = storage.Client()
          bucket = client.bucket("${{ secrets.CLOUD_BUCKET }}")
          blob = bucket.blob("metrics/latest/metrics.json")
          
          old_acc = 0.0
          try:
              old_metrics_str = blob.download_as_text()
              old_metrics = json.loads(old_metrics_str)
              old_acc = float(old_metrics.get("accuracy", 0.0))
              print(f"Previous run accuracy: {old_acc:.4f}")
          except Exception as e:
              print("No previous metrics found or failed to read them. Setting old accuracy to 0.0.")
          
          if new_acc < old_acc:
              raise SystemExit(f"FAILED: accuracy decreased from {old_acc:.4f} to {new_acc:.4f}. Huy deploy.")
          print(f"PASSED: Accuracy safety check ({new_acc:.4f} >= {old_acc:.4f})")
          
          # Luu reference metric moi len GCS
          new_metrics = {"accuracy": new_acc}
          blob.upload_from_string(json.dumps(new_metrics))
          print("Metrics reference updated on GCS.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # TODO 7: Restart service mlops-serve tren VM.
            sudo systemctl restart mlops-serve
            # TODO 8: Cho server san sang roi goi curl /health de xac nhan.
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
